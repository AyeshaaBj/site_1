<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>База данных обращений</title>
</head>
<body>
    <h2>База данных обращений</h2>
    
    <p>Всего записей: <strong id="totalCount">0</strong></p>
    
    <p>
        <button onclick="refreshTable()">Обновить</button>
        <button onclick="clearAllData()">Очистить всё</button>
    </p>
    
    <p>
        <input type="text" id="searchInput" placeholder="Поиск..." onkeyup="filterTable()">
    </p>
    
    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th onclick="sortTable('id')">Номер</th>
                <th onclick="sortTable('date')">Дата</th>
                <th onclick="sortTable('name')">Имя</th>
                <th onclick="sortTable('contact')">Контакт</th>
                <th onclick="sortTable('message')">Сообщение</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6">Нет данных</td></tr>
        </tbody>
    </table>
    
    <p><a href="index.html">← На главную</a></p>

    <script>
        let currentData = [];
        let currentSort = { column: 'id', direction: 'desc' };
        let editMode = null;
        
        function loadData() {
            const stored = localStorage.getItem('feedbacks');
            if (stored) {
                currentData = JSON.parse(stored);
            } else {
                const demo = [{
                    id: 1,
                    name: "Пример Пользователь",
                    contact: "demo@example.com",
                    message: "Демонстрационная запись",
                    date: new Date().toLocaleString('ru-RU')
                }];
                localStorage.setItem('feedbacks', JSON.stringify(demo));
                currentData = demo;
            }
            document.getElementById('totalCount').innerText = currentData.length;
            applySortAndRender();
        }
        
        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }
            applySortAndRender();
        }
        
        function applySortAndRender() {
            let sorted = [...currentData];
            sorted.sort((a, b) => {
                let valA = a[currentSort.column];
                let valB = b[currentSort.column];
                if (currentSort.column === 'id') {
                    valA = Number(valA);
                    valB = Number(valB);
                }
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                return 0;
            });
            renderTable(sorted);
        }
        
        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (!searchTerm) {
                applySortAndRender();
                return;
            }
            const filtered = currentData.filter(item => 
                item.name.toLowerCase().includes(searchTerm) ||
                item.contact.toLowerCase().includes(searchTerm) ||
                item.message.toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        }
        
        function startEdit(id) {
            editMode = id;
            applySortAndRender();
        }
        
        function cancelEdit() {
            editMode = null;
            applySortAndRender();
        }
        
        function saveEdit(id) {
            const newName = document.getElementById(`edit_name_${id}`).value.trim();
            const newContact = document.getElementById(`edit_contact_${id}`).value.trim();
            const newMessage = document.getElementById(`edit_message_${id}`).value.trim();
            
            if (!newName) {
                alert('Имя не может быть пустым');
                return;
            }
            if (!newContact) {
                alert('Контакт не может быть пустым');
                return;
            }
            if (!newMessage) {
                alert('Сообщение не может быть пустым');
                return;
            }
            
            const index = currentData.findIndex(item => item.id === id);
            if (index !== -1) {
                currentData[index].name = newName;
                currentData[index].contact = newContact;
                currentData[index].message = newMessage;
                currentData[index].date = new Date().toLocaleString('ru-RU') + ' (отредактировано)';
                localStorage.setItem('feedbacks', JSON.stringify(currentData));
            }
            
            editMode = null;
            loadData();
        }
        
        function deleteRecord(id) {
            if (confirm('Удалить эту запись?')) {
                currentData = currentData.filter(item => item.id !== id);
                for (let i = 0; i < currentData.length; i++) {
                    currentData[i].id = i + 1;
                }
                localStorage.setItem('feedbacks', JSON.stringify(currentData));
                loadData();
            }
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">Ничего не найдено</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map(item => {
                if (editMode === item.id) {
                    return `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.date || '-'}</td>
                            <td><input type="text" id="edit_name_${item.id}" value="${escapeHtml(item.name)}" style="width:100%"></td>
                            <td><input type="text" id="edit_contact_${item.id}" value="${escapeHtml(item.contact)}" style="width:100%"></td>
                            <td><textarea id="edit_message_${item.id}" style="width:100%; min-width:200px;" rows="2">${escapeHtml(item.message)}</textarea></td>
                            <td>
                                <button onclick="saveEdit(${item.id})">Сохранить</button>
                                <button onclick="cancelEdit()">Отмена</button>
                            </td>
                        </tr>
                    `;
                } else {
                    return `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.date || '-'}</td>
                            <td>${escapeHtml(item.name)}</td>
                            <td>${escapeHtml(item.contact)}</td>
                            <td style="white-space: pre-wrap;">${escapeHtml(item.message)}</td>
                            <td>
                                <button onclick="startEdit(${item.id})">Редактировать</button>
                                <button onclick="deleteRecord(${item.id})">Удалить</button>
                            </td>
                        </tr>
                    `;
                }
            }).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function refreshTable() {
            loadData();
        }
        
        function clearAllData() {
            if (confirm('Удалить все обращения?')) {
                localStorage.setItem('feedbacks', '[]');
                loadData();
            }
        }
        
        loadData();
    </script>
</body>
</html>
